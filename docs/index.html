<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>通学ダッシュボード</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="topbar">
  <div class="brand">
    <div class="brand-icon"><i class="ti ti-layout-dashboard" aria-hidden="true"></i></div>
    <h1>通学ダッシュボード</h1>
  </div>
  <span class="topbar-date" id="topDate"></span>
</nav>

<main class="container">

  <!-- Summary Counters -->
  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-label"><i class="ti ti-train" aria-hidden="true"></i>登録路線</div>
      <div class="summary-value" id="sumLines">0</div>
      <div class="summary-sub">路線</div>
    </div>
    <div class="summary-card">
      <div class="summary-label"><i class="ti ti-alert-triangle" aria-hidden="true"></i>遅延・障害</div>
      <div class="summary-value" id="sumDelays" style="color:var(--amber-dot)">0</div>
      <div class="summary-sub">件</div>
    </div>
    <div class="summary-card">
      <div class="summary-label"><i class="ti ti-flame" aria-hidden="true"></i>締め切り間近</div>
      <div class="summary-value" id="sumUrgent" style="color:var(--red-dot)">0</div>
      <div class="summary-sub">3日以内</div>
    </div>
    <div class="summary-card">
      <div class="summary-label"><i class="ti ti-calendar" aria-hidden="true"></i>今月の提出物</div>
      <div class="summary-value" id="sumTotal">0</div>
      <div class="summary-sub">件</div>
    </div>
  </div>

  <!-- Navigation Tabs -->
  <div class="tabs">
    <button class="tab active" id="btn-tab-transit"><i class="ti ti-train" aria-hidden="true"></i>交通機関</button>
    <button class="tab" id="btn-tab-deadline"><i class="ti ti-calendar-due" aria-hidden="true"></i>締め切り管理</button>
  </div>

  <!-- Transit Section -->
  <div class="section active" id="tab-transit">
    <div class="info-banner">
      <i class="ti ti-info-circle" style="font-size:16px;flex-shrink:0;margin-top:1px" aria-hidden="true"></i>
      路線を追加すると公式サイトのリンクが表示されます。ページを開いて確認後、手動でステータスを更新してください。
    </div>
    <div class="add-row">
      <input type="text" id="lineInput" placeholder="路線名（例：山手線）" />
      <select id="typeSelect">
        <option value="train">電車</option>
        <option value="subway">地下鉄</option>
        <option value="bus">バス</option>
      </select>
      <button class="btn-primary" id="btnAddLine"><i class="ti ti-plus" aria-hidden="true"></i> 追加</button>
    </div>
    <div class="transit-list" id="transitList"></div>
  </div>

  <!-- Deadline Section -->
  <div class="section" id="tab-deadline">
    <div class="dl-form">
      <div class="form-row">
        <input type="text" id="dlTitle" placeholder="提出物の名前（例：レポート第3回）" />
        <input type="text" id="dlSubject" placeholder="科目名" style="flex:0 0 140px" />
      </div>
      <div class="form-row">
        <input type="date" id="dlDate" />
        <select id="dlType">
          <option value="report">レポート</option>
          <option value="exam">試験</option>
          <option value="assignment">課題</option>
          <option value="other">その他</option>
        </select>
        <button class="btn-primary" id="btnAddDL"><i class="ti ti-plus" aria-hidden="true"></i> 追加</button>
      </div>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="urgent"><i class="ti ti-flame" style="font-size:11px"></i> 3日以内</button>
      <button class="filter-btn" data-filter="week">1週間以内</button>
      <button class="filter-btn" data-filter="month">1ヶ月以内</button>
    </div>
    <div class="dl-list" id="deadlineList"></div>
  </div>

</main>

<!-- Custom Scripts -->
<script src="app.js"></script>
</body>
</html>

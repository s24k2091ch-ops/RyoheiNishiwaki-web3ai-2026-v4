<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>キャンパスナビ</title>
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel CDN (ブラウザ上でのJSXコンパイル用) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #F0F4F8;
      margin: 0;
      font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
      min-height: 100vh;
    }
    /* 横スクロール対応のスクロールバー非表示 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const DAYS = ["月", "火", "水", "木", "金", "土"];
    const PERIODS = [
      { p: 1, s: "09:00", e: "10:00" }, { p: 2, s: "10:00", e: "11:00" },
      { p: 3, s: "11:00", e: "12:00" }, { p: 4, s: "12:00", e: "13:00" },
      { p: 5, s: "13:00", e: "14:00" }, { p: 6, s: "14:00", e: "15:00" },
      { p: 7, s: "15:00", e: "16:00" }, { p: 8, s: "16:00", e: "17:00" },
      { p: 9, s: "17:00", e: "18:00" }, { p: 10, s: "18:00", e: "19:00" },
    ];

    // 欠席回数に応じたセルの色 (0=通常授業色, 1=水色, 2=黄色, 3=赤, 4+=黒)
    const ABSENT_COLORS = [
      null,
      { bg: "#B3E5FC", text: "#01579B", label: "欠1" },
      { bg: "#FFF176", text: "#7A6000", label: "欠2" },
      { bg: "#FFCDD2", text: "#B71C1C", label: "欠3" },
      { bg: "#37474F", text: "#FFFFFF", label: "欠4+" },
    ];

    const CLASS_COLORS = [
      { bg: "#FFD9C0", text: "#7A3B10" }, { bg: "#C8E6C9", text: "#1B5E20" },
      { bg: "#B3E5FC", text: "#01579B" }, { bg: "#F8BBD0", text: "#880E4F" },
      { bg: "#D7CCC8", text: "#4E342E" }, { bg: "#DCEDC8", text: "#33691E" },
      { bg: "#FFF9C4", text: "#F57F17" }, { bg: "#E1BEE7", text: "#4A148C" },
    ];
    const SEMESTERS = ["2026年 1学期", "2026年 2学期"];
    const CIT_STATIONS = ["新習志野駅", "津田沼駅", "新津田沼駅"];
    const TRANSPORT_TYPES = ["電車", "地下鉄", "バス"];
    const TYPE_ICON = { 電車: "🚃", 地下鉄: "🚇", バス: "🚌" };
    const DL_TYPES = ["レポート", "試験", "課題", "その他"];
    const TYPE_COLOR = { レポート: "#B3E5FC", 試験: "#F8BBD0", 課題: "#DCEDC8", その他: "#D7CCC8" };
    const TYPE_TEXT = { レポート: "#01579B", 試験: "#880E4F", 課題: "#33691E", その他: "#4E342E" };

    function colorFor(name) {
      let h = 0;
      for (let c of name) h = c.charCodeAt(0) + ((h << 5) - h);
      return CLASS_COLORS[Math.abs(h) % CLASS_COLORS.length];
    }

    const SK = "campusDash3_";
    function load(k, d) { try { const v = localStorage.getItem(SK + k); return v ? JSON.parse(v) : d; } catch { return d; } }
    function save(k, v) { try { localStorage.setItem(SK + k, JSON.stringify(v)); } catch {} }

    function gmapsRouteUrl(from, to, arrive) {
      const base = `https://www.google.com/maps/dir/${encodeURIComponent(from)}/${encodeURIComponent(to)}`;
      if (arrive) {
        const [h, m] = arrive.split(":").map(Number);
        const d = new Date();
        d.setHours(h, m, 0, 0);
        if (d < new Date()) d.setDate(d.getDate() + 1);
        const tzOffsetMs = d.getTimezoneOffset() * 60 * 1000;
        const ts = Math.floor((d.getTime() - tzOffsetMs) / 1000);
        return `${base}/data=!4m6!4m5!2m3!6e1!7e2!8j${ts}!3e3`;
      }
      return `${base}/data=!3m1!4b1!4m2!4m1!3e3`;
    }

    function App() {
      const [tab, setTab] = useState("timetable");
      const [sem, setSem] = useState(0);
      const [classes, setClasses] = useState(() => load("classes", {}));
      const [absences, setAbsences] = useState(() => load("absences", {})); // {semKey_cellKey: count}
      const [deadlines, setDeadlines] = useState(() => load("deadlines", []));
      const [routes, setRoutes] = useState(() => load("routes", []));
      const [tripRoutes, setTripRoutes] = useState(() => load("trips", []));
      const [citRoutes, setCitRoutes] = useState(() => load("cit", []));
      const [modal, setModal] = useState(null);
      const [editCell, setEditCell] = useState(null);
      const [cellForm, setCellForm] = useState({ name: "", room: "", periodEnd: null });
      const [dlForm, setDlForm] = useState({ title: "", date: "", type: "レポート" });
      const [routeForm, setRouteForm] = useState({ name: "", type: "電車" });
      const [tripForm, setTripForm] = useState({ from: "", to: "", type: "電車", arrive: "" });
      const [citForm, setCitForm] = useState({ from: "", to: "新習志野駅", type: "電車", arrive: "" });
      const [semMenu, setSemMenu] = useState(false);
      const [weather, setWeather] = useState(null); // { code, tempMax, precip, comment, bg, emoji }
      // 出席通知: { key, name, period } が入ったら通知バナー表示
      const [attendanceAlert, setAttendanceAlert] = useState(null);
      const timerRefs = useRef({});

      const todayDow = new Date().getDay();
      const todayDayIdx = todayDow === 0 ? -1 : todayDow - 1;

      useEffect(() => { save("classes", classes); }, [classes]);
      useEffect(() => { save("absences", absences); }, [absences]);
      useEffect(() => { save("deadlines", deadlines); }, [deadlines]);
      useEffect(() => { save("routes", routes); }, [routes]);
      useEffect(() => { save("trips", tripRoutes); }, [tripRoutes]);
      useEffect(() => { save("cit", citRoutes); }, [citRoutes]);

      // 締め切りカウント用の日数計算関数
      function getDays(dateStr) {
        const t = new Date(); t.setHours(0,0,0,0);
        const d = new Date(dateStr); d.setHours(0,0,0,0);
        return Math.round((d-t)/86400000);
      }

      // 締め切りプッシュ通知（Notification API）のマージ
      useEffect(() => {
        function checkDeadlineNotifications() {
          if (!('Notification' in window) || Notification.permission !== 'granted') return;
          
          const todayStr = new Date().toISOString().split('T')[0];
          const notifiedDeadlines = JSON.parse(localStorage.getItem('td_notified_deadlines') || '{}');

          // 古い日付の通知記録をクリーンアップ
          Object.keys(notifiedDeadlines).forEach(key => {
            const keyDate = key.split('_').pop();
            if (keyDate < todayStr) delete notifiedDeadlines[key];
          });

          deadlines.forEach(dl => {
            const days = getDays(dl.date);
            if (days < 0 || days > 3) return; // 3日より先・期限切れはスキップ

            const notifKey = `${dl.title}_${todayStr}`;
            if (notifiedDeadlines[notifKey]) return; // 本日すでに通知済み

            const daysText = days === 0 ? '今日が締め切り！' : `あと${days}日で締め切り！`;
            const body = `【${dl.type}】${dl.title}\n${daysText}（${dl.date}）`;

            try {
              const notif = new Notification('📅 締め切りリマインダー', {
                body,
                tag: notifKey,
                requireInteraction: days === 0
              });

              notif.onclick = () => { window.focus(); notif.close(); };
              notifiedDeadlines[notifKey] = true;
              localStorage.setItem('td_notified_deadlines', JSON.stringify(notifiedDeadlines));
            } catch (e) {
              console.warn('通知の表示に失敗しました:', e);
            }
          });
        }

        if ('Notification' in window) {
          if (Notification.permission === 'granted') {
            checkDeadlineNotifications();
            const interval = setInterval(checkDeadlineNotifications, 60 * 60 * 1000);
            return () => clearInterval(interval);
          } else if (Notification.permission !== 'denied') {
            Notification.requestPermission().then(permission => {
              if (permission === 'granted') {
                checkDeadlineNotifications();
              }
            });
          }
        }
      }, [deadlines]);

      // 天気取得（Open-Meteo, 習志野市）
      useEffect(() => {
        const WMO = {
          0:  { label:"快晴",      emoji:"☀️",  bg:"#FFF8E1", textBg:"#FFB300" },
          1:  { label:"晴れ",      emoji:"🌤️",  bg:"#FFF8E1", textBg:"#FFB300" },
          2:  { label:"一部曇り",  emoji:"⛅",  bg:"#ECEFF1", textBg:"#78909C" },
          3:  { label:"曇り",      emoji:"☁️",  bg:"#ECEFF1", textBg:"#546E7A" },
          45: { label:"霧",        emoji:"🌫️",  bg:"#ECEFF1", textBg:"#546E7A" },
          48: { label:"霧",        emoji:"🌫️",  bg:"#ECEFF1", textBg:"#546E7A" },
          51: { label:"霧雨",      emoji:"🌦️",  bg:"#E3F2FD", textBg:"#1976D2" },
          53: { label:"霧雨",      emoji:"🌦️",  bg:"#E3F2FD", textBg:"#1976D2" },
          55: { label:"強い霧雨",  emoji:"🌧️",  bg:"#E3F2FD", textBg:"#1565C0" },
          61: { label:"小雨",      emoji:"🌧️",  bg:"#E3F2FD", textBg:"#1565C0" },
          63: { label:"雨",        emoji:"🌧️",  bg:"#BBDEFB", textBg:"#0D47A1" },
          65: { label:"大雨",      emoji:"⛈️",  bg:"#BBDEFB", textBg:"#0D47A1" },
          71: { label:"小雪",      emoji:"🌨️",  bg:"#E8EAF6", textBg:"#3949AB" },
          73: { label:"雪",        emoji:"❄️",  bg:"#E8EAF6", textBg:"#283593" },
          75: { label:"大雪",      emoji:"❄️",  bg:"#E8EAF6", textBg:"#1A237E" },
          80: { label:"にわか雨",  emoji:"🌦️",  bg:"#E3F2FD", textBg:"#1565C0" },
          81: { label:"雨",        emoji:"🌧️",  bg:"#BBDEFB", textBg:"#0D47A1" },
          82: { label:"激しい雨",  emoji:"⛈️",  bg:"#BBDEFB", textBg:"#0D47A1" },
          95: { label:"雷雨",      emoji:"⛈️",  bg:"#EDE7F6", textBg:"#4527A0" },
          96: { label:"雷雨・雹",  emoji:"⛈️",  bg:"#EDE7F6", textBg:"#311B92" },
          99: { label:"激しい雷雨",emoji:"⛈️",  bg:"#EDE7F6", textBg:"#311B92" },
        };
        // 天気コードからコメントを生成
        function makeComment(code, tempMax, precip) {
          const isRainy = [51,53,55,61,63,65,80,81,82,95,96,99].includes(code);
          const isHeavy = [65,82,95,96,99].includes(code);
          const isSnow  = [71,73,75].includes(code);
          const isFoggy = [45,48].includes(code);
          const isCloudy= [2,3].includes(code);
          const isSunny = [0,1].includes(code);
          const isHot   = tempMax >= 30;
          const isCold  = tempMax <= 5;

          if (isHeavy)  return "今日は大雨だ⚡ 交通機関が乱れる可能性大！早めに家を出よう！";
          if (isRainy && precip >= 5) return "今日は雨☂️ 交通機関が乱れるかもしれないから早めに家を出よう！";
          if (isRainy)  return "今日は雨っぽいね☂️ 傘を忘れずに！遅刻しないよう早めに出発しよう！";
          if (isSnow)   return "雪が降るかも❄️ 路面が滑りやすいし電車が遅れるかも。いつもより早く出よう！";
          if (isFoggy)  return "霧で視界が悪いね🌫️ 交通機関に影響が出るかも。時間に余裕を持って！";
          if (isCloudy) return "今日は曇りか〜☁️ まぁ頑張ろう！";
          if (isSunny && isHot) return `今日は晴れだけど気温${tempMax}℃でめちゃ暑い🥵 熱中症に気をつけてね！`;
          if (isSunny && isCold) return `晴れてるけど${tempMax}℃で寒い🥶 しっかり着込んで行こう！`;
          if (isSunny)  return "今日はいい天気だね☀️ 気持ちよく登校しよう！頑張れ〜！";
          return "今日も一日頑張ろう💪 遅刻しないようにね！";
        }

        fetch("https://api.open-meteo.com/v1/forecast?latitude=35.67&longitude=140.02&daily=weathercode,temperature_2m_max,precipitation_sum&timezone=Asia%2FTokyo&forecast_days=1")
          .then(r => r.json())
          .then(data => {
            const code = data.daily.weathercode[0];
            const tempMax = Math.round(data.daily.temperature_2m_max[0]);
            const precip = data.daily.precipitation_sum[0] || 0;
            const w = WMO[code] || WMO[3];
            setWeather({
              label: w.label, emoji: w.emoji, bg: w.bg, textBg: w.textBg,
              tempMax, precip,
              comment: makeComment(code, tempMax, precip),
              isRainy: [51,53,55,61,63,65,80,81,82,95,96,99].includes(code),
            });
          })
          .catch(() => {}); // 失敗時は非表示のまま
      }, []);

      const semKey = `s${sem}`;
      const semCls = classes[semKey] || {};
      const ck = (d, p) => `${d}_${p}`;
      const absKey = (cellKey) => `${semKey}_${cellKey}`;
      const getAbsent = (cellKey) => absences[absKey(cellKey)] || 0;

      const soon = deadlines.filter(d => { const diff = getDays(d.date); return diff >= 0 && diff <= 3; }).length;
      const totalTransport = routes.length + tripRoutes.length + citRoutes.length;

      // 授業開始15分後に出席登録通知を仕掛ける
      function scheduleAttendanceAlert(day, period, key, name) {
        // 今日の授業かチェック
        if (day !== todayDayIdx) return;
        const periodInfo = PERIODS[period - 1];
        if (!periodInfo) return;
        const [sh, sm] = periodInfo.s.split(":").map(Number);
        const now = new Date();
        const classStart = new Date();
        classStart.setHours(sh, sm, 0, 0);
        const alertTime = new Date(classStart.getTime() + 15 * 60 * 1000);
        const delay = alertTime - now;
        if (delay < 0) return; // 既に15分経過していたら無視

        // 既存タイマーをクリア
        if (timerRefs.current[key]) clearTimeout(timerRefs.current[key]);
        timerRefs.current[key] = setTimeout(() => {
          setAttendanceAlert({ key, name, period });
        }, delay);
      }

      // classesが変わったとき、今日の授業すべてにタイマーをセット
      useEffect(() => {
        Object.entries(semCls).forEach(([cellKey, cls]) => {
          const [dayStr, periodStr] = cellKey.split("_");
          scheduleAttendanceAlert(Number(dayStr), Number(periodStr), cellKey, cls.name);
        });
        return () => { Object.values(timerRefs.current).forEach(clearTimeout); };
      }, [classes, sem]);

      function openCell(day, period) {
        // タップしたセルが「続き」行なら先頭セルを探す
        let headPeriod = period;
        for (let p = period - 1; p >= 1; p--) {
          const prevKey = ck(day, p);
          const prev = semCls[prevKey];
          if (prev && prev.spanTo >= period) { headPeriod = p; break; }
          if (!prev || !prev.spanTo || prev.spanTo < p) break;
        }
        const key = ck(day, headPeriod);
        const ex = semCls[key];
        setCellForm(ex ? { name: ex.name, room: ex.room || "", periodEnd: ex.spanTo || headPeriod } : { name: "", room: "", periodEnd: headPeriod });
        setEditCell({ day, period: headPeriod, key });
        setModal("cell");
      }

      function saveCell() {
        const { day, period: periodStart, key } = editCell;
        const periodEnd = cellForm.periodEnd || periodStart;
        setClasses(prev => {
          const next = { ...prev, [semKey]: { ...(prev[semKey] || {}) } };
          // 既存のスパンを全部削除（古い範囲をクリア）
          const oldCls = prev[semKey]?.[key];
          if (oldCls) {
            const oldEnd = oldCls.spanTo || periodStart;
            for (let p = periodStart; p <= oldEnd; p++) delete next[semKey][ck(day, p)];
          }
          if (!cellForm.name.trim()) return next;
          // 新しいスパン全セルに書き込む
          const end = Math.max(periodStart, periodEnd);
          for (let p = periodStart; p <= end; p++) {
            next[semKey][ck(day, p)] = {
              name: cellForm.name.trim(),
              room: cellForm.room.trim(),
              spanHead: p === periodStart,  // 先頭セルのみtrue
              spanTo: end,                  // 先頭セルに終了限を記録
            };
          }
          return next;
        });
        setModal(null);
      }

      function markAttended(cellKey) {
        // 出席ボタンを押したら欠席カウントを増やさない（通知を消すだけ）
        setAttendanceAlert(null);
      }

      function markAbsent(cellKey) {
        // 欠席としてカウント
        setAbsences(prev => {
          const ak = absKey(cellKey);
          return { ...prev, [ak]: (prev[ak] || 0) + 1 };
        });
        setAttendanceAlert(null);
      }

      function resetAbsent(cellKey) {
        setAbsences(prev => {
          const next = { ...prev };
          delete next[absKey(cellKey)];
          return next;
        });
      }

      function addDeadline() {
        if (!dlForm.title.trim() || !dlForm.date) return;
        setDeadlines(p => [...p, { id: Date.now(), ...dlForm }]);
        setDlForm({ title: "", date: "", type: "レポート" });
        setModal(null);
      }

      function addRoute() {
        if (!routeForm.name.trim()) return;
        setRoutes(p => [...p, { id: Date.now(), ...routeForm }]);
        setRouteForm({ name: "", type: "電車" });
        setModal(null);
      }

      function addTrip() {
        if (!tripForm.from.trim() || !tripForm.to.trim()) return;
        setTripRoutes(p => [...p, { id: Date.now(), ...tripForm }]);
        setTripForm({ from: "", to: "", type: "電車", arrive: "" });
        setModal(null);
      }

      function addCit() {
        if (!citForm.from.trim()) return;
        setCitRoutes(p => [...p, { id: Date.now(), ...citForm }]);
        setCitForm({ from: "", to: "新習志野駅", type: "電車", arrive: "" });
        setModal(null);
      }

      // セルの色を欠席回数で決定
      function cellColor(cellKey, className) {
        const absent = getAbsent(cellKey);
        if (absent === 0) return colorFor(className);
        const ac = ABSENT_COLORS[Math.min(absent, 4)];
        return { bg: ac.bg, text: ac.text };
      }

      const inputStyle = {
        width: "100%", padding: "10px 12px", borderRadius: 10,
        border: "1.5px solid #D0DCE8", fontSize: 14, boxSizing: "border-box", outline: "none", fontFamily: "inherit",
      };
      const primaryBtn = {
        width: "100%", padding: 13, borderRadius: 12, border: "none",
        background: "#1565C0", color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer",
        marginTop: 8, display: "block", fontFamily: "inherit",
      };
      const typeChip = (active) => ({
        padding: "6px 14px", borderRadius: 20, border: "1.5px solid",
        borderColor: active ? "#1565C0" : "#D0DCE8", background: active ? "#EBF3FF" : "#fff",
        color: active ? "#1565C0" : "#7A8A9A", fontSize: 13, fontWeight: active ? 700 : 400,
        cursor: "pointer", fontFamily: "inherit",
      });

      return (
        <div style={{ fontFamily: "'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif", maxWidth: 420, margin: "0 auto", background: "#F0F4F8", minHeight: "100vh", paddingBottom: 24 }}>

          {/* ── 出席登録通知バナー ── */}
          {attendanceAlert && (
            <div style={{ position: "fixed", top: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 420, zIndex: 500, padding: "0 12px", boxSizing: "border-box" }}>
              <div style={{ background: "#1A2332", borderRadius: "0 0 16px 16px", padding: "14px 16px", boxShadow: "0 4px 20px rgba(0,0,0,0.3)" }}>
                <div style={{ fontSize: 12, color: "#9AAABB", marginBottom: 4 }}>⏰ 出席登録の確認</div>
                <div style={{ fontSize: 15, fontWeight: 700, color: "#fff", marginBottom: 12 }}>
                  {attendanceAlert.period}限「{attendanceAlert.name}」の出席登録は完了しましたか？
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => markAttended(attendanceAlert.key)}
                    style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", background: "#2E7D32", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                    ✅ 出席した
                  </button>
                  <button onClick={() => markAbsent(attendanceAlert.key)}
                    style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", background: "#C62828", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                    ❌ 欠席した
                  </button>
                  <button onClick={() => setAttendanceAlert(null)}
                    style={{ padding: "10px 12px", borderRadius: 10, border: "1px solid #445566", background: "transparent", color: "#9AAABB", fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>
                    後で
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ── 天気カード ── */}
          {weather && (

                  </div>

                  {/* 欠席管理（授業登録済みのとき表示） */}
                  {semCls[editCell.key] && (() => {
                    const absent = getAbsent(editCell.key);
                    const absentColor = absent > 0 ? ABSENT_COLORS[Math.min(absent, 4)] : null;
                    return (
                      <div style={{ marginBottom: 16, padding: "10px 14px", borderRadius: 12, background: absent === 0 ? "#F0F4F8" : absentColor.bg, border: absent > 0 ? `1.5px solid ${absentColor.bg}` : "1.5px solid #E0E8F0" }}>
                        <div style={{ display: "flex", alignItems: "center", justify-content: "space-between" }}>
                          <div>
                            <div style={{ fontSize: 11, color: absent > 0 ? absentColor.text : "#7A8A9A", marginBottom: 2 }}>欠席回数</div>
                            <div style={{ fontSize: 22, fontWeight: 700, color: absent > 0 ? absentColor.text : "#3A4A5C" }}>{absent}<span style={{ fontSize: 13, fontWeight: 400 }}>回</span></div>
                          </div>
                          <div style={{ display: "flex", gap: 6 }}>
                            <button onClick={() => setAbsences(prev => { const ak = absKey(editCell.key); return { ...prev, [ak]: (prev[ak] || 0) + 1 }; })}
                              style={{ padding: "7px 14px", borderRadius: 10, border: "none", background: "#C62828", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                              ＋ 欠席
                            </button>
                            {absent > 0 && (
                              <button onClick={() => resetAbsent(editCell.key)}
                                style={{ padding: "7px 10px", borderRadius: 10, border: "1.5px solid #C8D0DC", background: "#fff", color: "#7A8A9A", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>
                                リセット
                              </button>
                            )}
                          </div>
                        </div>
                        {absent > 0 && absent <= 4 && (
                          <div style={{ marginTop: 6, fontSize: 11, color: absentColor.text, fontWeight: 600 }}>
                            {absent === 1 && "😊 まだ大丈夫"}
                            {absent === 2 && "😟 あれ？大丈夫？"}
                            {absent === 3 && "😱 やばいぞ！次で落単！"}
                            {absent >= 4 && "💀 落単"}
                          </div>
                        )}
                      </div>
                    );
                  })()}

                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 12, color: "#7A8A9A", marginBottom: 4 }}>授業名</div>
                    <input value={cellForm.name} onChange={e => setCellForm(f => ({ ...f, name: e.target.value }))} placeholder="例：イノベーションマネジメント" style={inputStyle} />
                  </div>
                  <div style={{ marginBottom: 16 }}>
                    <div style={{ fontSize: 12, color: "#7A8A9A", marginBottom: 4 }}>教室</div>
                    <input value={cellForm.room} onChange={e => setCellForm(f => ({ ...f, room: e.target.value }))} placeholder="例：631" style={inputStyle} />
                  </div>
                  <button onClick={saveCell} style={primaryBtn}>保存</button>
                  {semCls[editCell.key] && (
                    <button onClick={() => {
                      const { day, period: periodStart } = editCell;
                      setClasses(prev => {
                        const n = { ...prev, [semKey]: { ...(prev[semKey] || {}) } };
                        const oldCls = n[semKey][editCell.key];
                        const oldEnd = oldCls?.spanTo || periodStart;
                        for (let p = periodStart; p <= oldEnd; p++) delete n[semKey][ck(day, p)];
                        return n;
                      });
                      setModal(null);
                    }}
                      style={{ ...primaryBtn, background: "#fff", color: "#C62828", border: "1.5px solid #EF9A9A", marginTop: 8 }}>削除</button>
                  )}
                </>)}

                {/* Deadline */}
                {modal === "deadline" && (<>
                  <h3 style={{ margin: "0 0 16px", fontSize: 16, color: "#1A2332" }}>締め切りを追加</h3>
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 12, color: "#7A8A9A", marginBottom: 4 }}>タイトル</div>
                    <input value={dlForm.title} onChange={e => setDlForm(f => ({ ...f, title: e.target.value }))} placeholder="例：統計レポート第2回" style={inputStyle} />
                  </div>
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 12, color: "#7A8A9A", marginBottom: 4 }}>種類</div>
                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                      {DL_TYPES.map(t => <button key={t} onClick={() => setDlForm(f => ({ ...f, type: t }))} style={typeChip(dlForm.type === t)}>{t}</button>)}
                    </div>
                  </div>
                  <div style={{ marginBottom: 16 }}>
                    <div style={{ fontSize: 12, color: "#7A8A9A", marginBottom: 4 }}>締め切り日</div>
                    <input type="date" value={dlForm.date} onChange={e => setDlForm(f => ({ ...f, date: e.target.value }))} style={inputStyle} />
                  </div>
                  <button onClick={addDeadline} style={primaryBtn}>追加</button>
                </>)}

                {/* Route */}
                {modal === "route" && (<>
                  <h3 style={{ margin: "0 0 16px", fontSize: 16, color: "#1A2332" }}>路線を追加</h3>
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 12, color: "#7A8A9A", marginBottom: 4 }}>路線名</div>
                    <input value={routeForm.name} onChange={e => setRouteForm(f => ({ ...f, name: e.target.value }))} placeholder="例：東京メトロ有楽町線" style={inputStyle} />
                  </div>
                  <div style={{ marginBottom: 16 }}>
                    <div style={{ fontSize: 12, color: "#7A8A9A", marginBottom: 4 }}>種類</div>
                    <div style={{ display: "flex", gap: 8 }}>
                      {TRANSPORT_TYPES.map(t => <button key={t} onClick={() => setRouteForm(f => ({ ...f, type: t }))} style={{ ...typeChip(routeForm.type === t), flex: 1 }}>{TYPE_ICON[t]} {t}</button>)}
                    </div>
                  </div>
                  <button onClick={addRoute} style={primaryBtn}>追加</button>
                </>)}

                {/* Trip */}
                {modal === "trip" && (<>
                  <h3 style={{ margin: "0 0 16px", fontSize: 16, color: "#1A2332" }}>ルートを追加</h3>
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 12, color: "#7A8A9A", marginBottom: 4 }}>出発地</div>
                    <input value={tripForm.from} onChange={e => setTripForm(f => ({ ...f, from: e.target.value }))} placeholder="例：千葉駅" style={inputStyle} />
                  </div>
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 12, color: "#7A8A9A", marginBottom: 4 }}>目的地</div>
                    <input value={tripForm.to} onChange={e => setTripForm(f => ({ ...f, to: e.target.value }))} placeholder="例：早稲田大学" style={inputStyle} />
                  </div>
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 12, color: "#7A8A9A", marginBottom: 4 }}>到着時間（任意）</div>
                    <input type="time" value={tripForm.arrive} onChange={e => setTripForm(f => ({ ...f, arrive: e.target.value }))} style={inputStyle} />
                  </div>
                  <div style={{ marginBottom: 16 }}>
                    <div style={{ fontSize: 12, color: "#7A8A9A", marginBottom: 4 }}>種類</div>
                    <div style={{ display: "flex", gap: 8 }}>
                      {TRANSPORT_TYPES.map(t => <button key={t} onClick={() => setTripForm(f => ({ ...f, type: t }))} style={{ ...typeChip(tripForm.type === t), flex: 1 }}>{TYPE_ICON[t]} {t}</button>)}
                    </div>
                  </div>
                  <button onClick={addTrip} style={primaryBtn}>追加</button>
                </>)}

                {/* CIT */}
                {modal === "cit" && (<>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
                    <span style={{ display: "inline-flex", alignItems: "center" }}>
                      <svg width="22" height="22" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <ellipse cx="20" cy="16" rx="7" ry="13" fill="white" stroke="#BDBDBD" strokeWidth="2"/>
                        <ellipse cx="20" cy="16" rx="3.5" ry="9" fill="#F8BBD0"/>
                        <ellipse cx="44" cy="16" rx="7" ry="13" fill="white" stroke="#BDBDBD" strokeWidth="2"/>
                        <ellipse cx="44" cy="16" rx="3.5" ry="9" fill="#F8BBD0"/>
                        <ellipse cx="32" cy="36" rx="20" ry="18" fill="white" stroke="#BDBDBD" strokeWidth="2"/>
                        <circle cx="24" cy="33" r="3" fill="#F48FB1"/>
                        <circle cx="40" cy="33" r="3" fill="#F48FB1"/>
                        <ellipse cx="32" cy="40" rx="2.5" ry="1.5" fill="#F48FB1"/>
                        <line x1="14" y1="39" x2="28" y2="41" stroke="#BDBDBD" strokeWidth="1.2" strokeLinecap="round"/>
                        <line x1="14" y1="42" x2="28" y2="42" stroke="#BDBDBD" strokeWidth="1.2" strokeLinecap="round"/>
                        <line x1="50" y1="39" x2="36" y2="41" stroke="#BDBDBD" strokeWidth="1.2" strokeLinecap="round"/>
                        <line x1="50" y1="42" x2="36" y2="42" stroke="#BDBDBD" strokeWidth="1.2" strokeLinecap="round"/>
                      </svg>
                    </span>
                    <h3 style={{ margin: 0, fontSize: 16, color: "#6A1B9A" }}>千葉工大生専用ルート</h3>
                  </div>
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 12, color: "#7A8A9A", marginBottom: 4 }}>出発地（自宅の最寄り駅など）</div>
                    <input value={citForm.from} onChange={e => setCitForm(f => ({ ...f, from: e.target.value }))} placeholder="例：千葉駅" style={inputStyle} />
                  </div>
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 12, color: "#7A8A9A", marginBottom: 4 }}>到着駅</div>
                    <div style={{ display: "flex", gap: 8 }}>
                      {CIT_STATIONS.map(s => (
                        <button key={s} onClick={() => setCitForm(f => ({ ...f, to: s }))}
                          style={{ flex: 1, padding: "8px 4px", borderRadius: 10, border: "1.5px solid", borderColor: citForm.to === s ? "#6A1B9A" : "#D0DCE8", background: citForm.to === s ? "#F3E5F5" : "#fff", color: citForm.to === s ? "#6A1B9A" : "#7A8A9A", fontSize: 11, fontWeight: citForm.to === s ? 700 : 400, cursor: "pointer", fontFamily: "inherit", lineHeight: 1.4 }}>
                          {s}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 12, color: "#7A8A9A", marginBottom: 4 }}>到着時間（任意）</div>
                    <input type="time" value={citForm.arrive} onChange={e => setCitForm(f => ({ ...f, arrive: e.target.value }))} style={inputStyle} />
                  </div>
                  <div style={{ marginBottom: 16 }}>
                    <div style={{ fontSize: 12, color: "#7A8A9A", marginBottom: 4 }}>種類</div>
                    <div style={{ display: "flex", gap: 8 }}>
                      {TRANSPORT_TYPES.map(t => <button key={t} onClick={() => setCitForm(f => ({ ...f, type: t }))} style={{ ...typeChip(citForm.type === t), flex: 1 }}>{TYPE_ICON[t]} {t}</button>)}
                    </div>
                  </div>
                  <button onClick={addCit} style={{ ...primaryBtn, background: "#6A1B9A" }}>追加</button>
                </>)}
              </div>
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>通学ダッシュボード</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --surface2: #f1efe8;
      --border: rgba(0,0,0,0.1);
      --border-md: rgba(0,0,0,0.2);
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-tertiary: #888780;
      --radius-md: 8px;
      --radius-lg: 12px;
      --blue-bg: #e6f1fb; --blue-text: #0c447c;
      --green-bg: #eaf3de; --green-text: #27500a;
      --purple-bg: #eeedfe; --purple-text: #3c3489;
      --amber-bg: #faeeda; --amber-text: #854f0b;
      --red-bg: #fcebeb; --red-text: #a32d2d;
      --teal-bg: #e1f5ee; --teal-text: #085041;
      --green-dot: #639922; --amber-dot: #ba7517; --red-dot: #e24b4a;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18; --surface: #23231f; --surface2: #2c2c2a;
        --border: rgba(255, 255, 255, 0.1); --border-md: rgba(255, 255, 255, 0.2);
        --text-primary: #f1efe8; --text-secondary: #b4b2a9; --text-tertiary: #888780;
        --blue-bg: #042c53; --blue-text: #b5d4f4;
        --green-bg: #173404; --green-text: #c0dd97;
        --purple-bg: #26215c; --purple-text: #cecbf6;
        --amber-bg: #412402; --amber-text: #fac775;
        --red-bg: #501313; --red-text: #f7c1c1;
        --teal-bg: #04342c; --teal-text: #9fe1cb;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }

    /* topbar */
    .topbar { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon { width: 32px; height: 32px; border-radius: var(--radius-md); background: var(--text-primary); color: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .brand h1 { font-size: 16px; font-weight: 500; }
    .topbar-date { font-size: 12px; color: var(--text-tertiary); }

    /* container */
    .container { max-width: 820px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

    /* summary */
    .summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 1.5rem; }
    @media(max-width:600px){ .summary-grid { grid-template-columns: repeat(2,1fr); } }
    .summary-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; }
    .summary-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
    .summary-value { font-size: 26px; font-weight: 500; }
    .summary-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

    /* tabs */
    .tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem; }
    .tab { font-size: 14px; font-weight: 500; color: var(--text-secondary); padding: 10px 16px; cursor: pointer; background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -0.5px; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
    .tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); }
    .tab:hover:not(.active) { color: var(--text-primary); }
    .section { display: none; }
    .section.active { display: block; }

    /* inputs */
    input, select, textarea { font-family: inherit; }
    .add-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .add-row input, .add-row select { font-size: 14px; padding: 8px 12px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); background: var(--surface); color: var(--text-primary); outline: none; transition: border-color 0.15s; }
    .add-row input:focus, .add-row select:focus { border-color: var(--text-primary); }
    .add-row input { flex: 1; min-width: 160px; }
    .add-row select { min-width: 110px; }
    .btn-primary { font-size: 13px; padding: 8px 16px; background: var(--text-primary); color: var(--bg); border: none; border-radius: var(--radius-md); cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 4px; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.75; }

    /* transit */
    .transit-list { display: flex; flex-direction: column; gap: 10px; }
    .transit-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
    .tc-header { display: flex; align-items: center; justify-content: space-between; }
    .tc-name { font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .type-badge { font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md); font-weight: 500; }
    .badge-train  { background: var(--blue-bg);   color: var(--blue-text); }
    .badge-subway { background: var(--purple-bg);  color: var(--purple-text); }
    .badge-bus    { background: var(--green-bg);   color: var(--green-text); }
    .tc-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .btn-link { font-size: 12px; padding: 5px 10px; background: none; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; text-decoration: none; transition: background 0.15s; }
    .btn-link:hover { background: var(--surface2); }
    .btn-del { background: none; border: none; cursor: pointer; color: var(--text-tertiary); padding: 4px 6px; border-radius: var(--radius-md); font-size: 16px; transition: color 0.15s; }
    .btn-del:hover { color: var(--red-dot); }

    /* manual status */
    .status-picker { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .status-picker span { font-size: 12px; color: var(--text-secondary); }
    .status-btn { font-size: 12px; padding: 5px 12px; border: 0.5px solid var(--border-md); border-radius: 20px; cursor: pointer; background: none; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; transition: all 0.15s; }
    .status-btn.active-normal { background: var(--green-bg); color: var(--green-text); border-color: var(--green-text); }
    .status-btn.active-delay  { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-text); }
    .status-btn.active-stop   { background: var(--red-bg);   color: var(--red-text);   border-color: var(--red-text); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-normal { background: var(--green-dot); }
    .dot-delay  { background: var(--amber-dot); }
    .dot-stop   { background: var(--red-dot); }
    .status-note { margin-top: 8px; }
    .status-note input { width: 100%; font-size: 13px; padding: 6px 10px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); background: var(--bg); color: var(--text-primary); outline: none; }
    .status-note input:focus { border-color: var(--text-primary); }
    .status-display { margin-top: 10px; font-size: 13px; color: var(--text-secondary); display: flex; align-items: flex-start; gap: 8px; }
    .info-pill { font-size: 12px; padding: 4px 10px; border-radius: var(--radius-md); margin-top: 6px; display: inline-flex; align-items: center; gap: 5px; }
    .pill-delay { background: var(--amber-bg); color: var(--amber-text); }
    .pill-stop  { background: var(--red-bg);   color: var(--red-text); }
    .pill-normal{ background: var(--green-bg);  color: var(--green-text); }
    .external-links { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .ext-link { font-size: 12px; color: var(--blue-text); background: var(--blue-bg); padding: 4px 10px; border-radius: var(--radius-md); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; transition: opacity 0.15s; }
    .ext-link:hover { opacity: 0.75; }

    /* deadline form */
    .dl-form { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .form-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .form-row:last-child { margin-bottom: 0; }
    .form-row input, .form-row select { font-size: 14px; padding: 8px 12px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); background: var(--bg); color: var(--text-primary); outline: none; transition: border-color 0.15s; }
    .form-row input:focus, .form-row select:focus { border-color: var(--text-primary); }
    .form-row input       { flex: 1; min-width: 140px; }
    .form-row input[type="date"] { flex: 0 0 160px; }
    .form-row select      { min-width: 110px; }

    /* filter */
    .filter-row { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn { font-size: 12px; padding: 5px 14px; background: none; border: 0.5px solid var(--border-md); border-radius: 20px; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; display: flex; align-items: center; gap: 4px; }
    .filter-btn.active { background: var(--text-primary); color: var(--bg); border-color: var(--text-primary); }

    /* deadline cards */
    .dl-list { display: flex; flex-direction: column; gap: 8px; }
    .dl-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; display: flex; align-items: center; gap: 12px; }
    .urgency-bar { width: 4px; border-radius: 2px; align-self: stretch; flex-shrink: 0; min-height: 44px; }
    .bar-urgent { background: var(--red-dot); }
    .bar-soon   { background: var(--amber-dot); }
    .bar-ok     { background: var(--green-dot); }
    .bar-past   { background: var(--text-tertiary); }
    .dl-content { flex: 1; min-width: 0; }
    .dl-title { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .dl-meta { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
    .notif { font-size: 10px; padding: 2px 7px; border-radius: var(--radius-md); background: var(--red-bg); color: var(--red-text); font-weight: 500; white-space: nowrap; }
    .dl-right { text-align: right; flex-shrink: 0; }
    .days-val { font-size: 20px; font-weight: 500; }
    .days-urgent { color: var(--red-dot); }
    .days-soon   { color: var(--amber-dot); }
    .days-ok     { color: var(--green-dot); }
    .days-past   { color: var(--text-tertiary); }
    .date-lbl { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

    /* empty */
    .empty { text-align: center; padding: 2.5rem 1rem; color: var(--text-secondary); font-size: 14px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); }
    .empty i { font-size: 28px; display: block; margin-bottom: 10px; color: var(--text-tertiary); }
    .empty small { font-size: 12px; color: var(--text-tertiary); margin-top: 4px; display: block; }

    /* info banner */
    .info-banner { background: var(--teal-bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 10px 14px; margin-bottom: 1rem; font-size: 13px; color: var(--teal-text); display: flex; align-items: flex-start; gap: 8px; }

    /* timetable */
    .timetable-list { display: flex; flex-direction: column; gap: 12px; }
    .day-section { margin-bottom: 1.5rem; }
    .day-header { font-size: 14px; font-weight: 600; color: var(--text-secondary); border-bottom: 0.5px solid var(--border); padding-bottom: 4px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .tt-grid { display: flex; flex-direction: column; gap: 8px; }
    .tt-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 0.75rem 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .tt-time { font-size: 13px; font-weight: 600; color: var(--blue-text); background: var(--blue-bg); padding: 3px 8px; border-radius: var(--radius-md); white-space: nowrap; }
    .tt-info { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .tt-title { font-size: 14px; font-weight: 500; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
    .tt-room { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
  </style>
</head>
<body>

<nav class="topbar">
  <div class="brand">
    <div class="brand-icon"><i class="ti ti-layout-dashboard" aria-hidden="true"></i></div>
    <h1>通学ダッシュボード</h1>
  </div>
  <span class="topbar-date" id="topDate"></span>
</nav>

<main class="container">

  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-label"><i class="ti ti-train" aria-hidden="true"></i>登録路線・ルート</div>
      <div class="summary-value" id="sumLines">0</div>
      <div class="summary-sub">件</div>
    </div>
    <div class="summary-card">
      <div class="summary-label"><i class="ti ti-alert-triangle" aria-hidden="true"></i>遅延・障害</div>
      <div class="summary-value" id="sumDelays" style="color:var(--amber-dot)">0</div>
      <div class="summary-sub">件</div>
    </div>
    <div class="summary-card">
      <div class="summary-label"><i class="ti ti-flame" aria-hidden="true"></i>締め切り間近</div>
      <div class="summary-value" id="sumUrgent" style="color:var(--red-dot)">0</div>
      <div class="summary-sub">3日以内</div>
    </div>
    <div class="summary-card">
      <div class="summary-label"><i class="ti ti-calendar" aria-hidden="true"></i>今月の提出物</div>
      <div class="summary-value" id="sumTotal">0</div>
      <div class="summary-sub">件</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('transit',this)"><i class="ti ti-train" aria-hidden="true"></i>交通機関</button>
    <button class="tab" onclick="switchTab('deadline',this)"><i class="ti ti-calendar-due" aria-hidden="true"></i>締め切り管理</button>
    <button class="tab" onclick="switchTab('timetable',this)"><i class="ti ti-clock" aria-hidden="true"></i>時間割</button>
  </div>

  <!-- Transit -->
  <div class="section active" id="tab-transit">
    <div class="info-banner">
      <i class="ti ti-info-circle" style="font-size:16px;flex-shrink:0;margin-top:1px" aria-hidden="true"></i>
      用途に合わせて登録方法を分けることができます。出発地➔目的地を登録するとGoogleマップ連携が可能です。
    </div>
    
    <!-- 2分割された登録フォームエリア -->
    <div class="dl-form" style="background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem;">
      
      <!-- 1. 路線名（運行状況確認）の登録 -->
      <div style="font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px;">
        <i class="ti ti-activity" style="color: var(--amber-dot); font-size:14px;"></i> 路線名（運行状況確認）を登録
      </div>
      <div class="add-row" style="margin-bottom: 1.25rem;">
        <input type="text" id="lineInput" placeholder="路線名（例：総武線）" onkeydown="if(event.key==='Enter')addLineOnly()" />
        <select id="typeSelect1">
          <option value="train">電車</option>
          <option value="subway">地下鉄</option>
          <option value="bus">バス</option>
        </select>
        <button class="btn-primary" onclick="addLineOnly()" style="background: var(--text-primary); color: var(--bg); border: none;"><i class="ti ti-plus" aria-hidden="true"></i> 路線を追加</button>
      </div>

      <div style="border-top: 1px dashed var(--border-md); margin: 1.25rem 0;"></div>

      <!-- 2. 出発地 ➔ 目的地の登録 -->
      <div style="font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px;">
        <i class="ti ti-map-2" style="color: var(--blue-text); font-size:14px;"></i> 出発地 ➔ 目的地（Googleマップ乗換案内）を登録
      </div>
      <div class="add-row">
        <input type="text" id="startInput" placeholder="出発地（例：稲毛駅）" onkeydown="if(event.key==='Enter')addRoute()" />
        <input type="text" id="destInput" placeholder="目的地（例：津田沼駅）" onkeydown="if(event.key==='Enter')addRoute()" />
        <select id="typeSelect2">
          <option value="train">電車</option>
          <option value="subway">地下鉄</option>
          <option value="bus">バス</option>
        </select>
        <button class="btn-primary" onclick="addRoute()" style="background: var(--text-primary); color: var(--bg); border: none;"><i class="ti ti-plus" aria-hidden="true"></i> ルートを追加</button>
      </div>
    </div>
    
    <div class="transit-list" id="transitList"></div>
  </div>

  <!-- Deadline -->
  <div class="section" id="tab-deadline">
    <div class="dl-form">
      <div class="form-row">
        <input type="text" id="dlTitle" placeholder="提出物の名前（例：レポート第3回）" onkeydown="if(event.key==='Enter')addDeadline()" />
        <input type="text" id="dlSubject" placeholder="科目名" style="flex:0 0 140px" />
      </div>
      <div class="form-row">
        <input type="date" id="dlDate" />
        <select id="dlType">
          <option value="report">レポート</option>
          <option value="exam">試験</option>
          <option value="assignment">課題</option>
          <option value="other">その他</option>
        </select>
        <button class="btn-primary" onclick="addDeadline()"><i class="ti ti-plus" aria-hidden="true"></i> 追加</button>
      </div>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="filterDL('all',this)">すべて</button>
      <button class="filter-btn" onclick="filterDL('urgent',this)"><i class="ti ti-flame" style="font-size:11px"></i> 3日以内</button>
      <button class="filter-btn" onclick="filterDL('week',this)">1週間以内</button>
      <button class="filter-btn" onclick="filterDL('month',this)">1ヶ月以内</button>
    </div>
    <div class="dl-list" id="deadlineList"></div>
  </div>

  <!-- Timetable -->
  <div class="section" id="tab-timetable">
    <div class="info-banner">
      <i class="ti ti-info-circle" style="font-size:16px;flex-shrink:0;margin-top:1px" aria-hidden="true"></i>
      今学期の時間割を登録します。授業開始の15分後に「出席登録終わった？」とポップアップでリマインドします。
    </div>
    <div class="dl-form">
      <div class="form-row">
        <select id="ttDay">
          <option value="1">月曜日</option>
          <option value="2">火曜日</option>
          <option value="3">水曜日</option>
          <option value="4">木曜日</option>
          <option value="5">金曜日</option>
          <option value="6">土曜日</option>
          <option value="0">日曜日</option>
        </select>
        <input type="text" id="ttTitle" placeholder="科目名（例：Web3概論）" onkeydown="if(event.key==='Enter')addTimetable()" />
      </div>
      <div class="form-row">
        <input type="text" id="ttRoom" placeholder="教室名（例：301教室）" style="flex: 1;" onkeydown="if(event.key==='Enter')addTimetable()" />
        <input type="time" id="ttTime" />
        <button class="btn-primary" onclick="addTimetable()"><i class="ti ti-plus" aria-hidden="true"></i> 追加</button>
      </div>
    </div>
    <div class="timetable-list" id="timetableList"></div>
  </div>

</main>

<script>
/* ── State ── */
let lines = JSON.parse(localStorage.getItem('td_lines') || '[]');
let deadlines = JSON.parse(localStorage.getItem('td_deadlines') || '[]');
let timetable = JSON.parse(localStorage.getItem('td_timetable') || '[]');
let dlFilter = 'all';
let alertedToday = {}; // { 'id_YYYY-MM-DD': true }

const typeLabel = { train:'電車', subway:'地下鉄', bus:'バス' };
const typeClass = { train:'badge-train', subway:'badge-subway', bus:'badge-bus' };
const typeIcon  = { train:'ti-train', subway:'ti-train', bus:'ti-bus' };
const dlTypeLabel = { report:'レポート', exam:'試験', assignment:'課題', other:'その他' };
const dayLabels = { '1': '月曜日', '2': '火曜日', '3': '水曜日', '4': '木曜日', '5': '金曜日', '6': '土曜日', '0': '日曜日' };

/* ── Search URL builder ── */
function searchURL(name, type, dest) {
  const urls = [];

  // 目的地(dest)が入力されている場合はGoogleマップルート案内を最優先で表示
  if (dest) {
    const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(name)}&destination=${encodeURIComponent(dest)}&travelmode=transit`;
    urls.push({ label: 'Googleマップ乗換案内', url: mapsUrl, isPrimary: true });
  }

  const q = encodeURIComponent(name + ' 運行情報');

  // 公式サイトマッピング
  const JRE = 'https://traininfo.jreast.co.jp/train_info/kanto.aspx';
  const METRO = 'https://www.tokyometro.jp/unkou/index.html';
  const TOEI  = 'https://www.kotsu.metro.tokyo.jp/subway/unkou.html';
  const map = {
    '山手線':JRE, '中央線':JRE, '京浜東北線':JRE, '総武線':JRE,
    '東海道線':JRE, '横須賀線':JRE, '埼京線':JRE, '常磐線':JRE,
    '南武線':JRE, '横浜線':JRE, '武蔵野線':JRE, '宇通宮線':JRE,
    '高崎線':JRE, '湘南新宿ライン':JRE, '上野東京ライン':JRE,
    'JR東日本':JRE,
    '東京メトロ':METRO, '銀座線':METRO, '丸ノ内線':METRO,
    '日比谷線':METRO, '東西線':METRO, '千代田線':METRO,
    '有楽町線':METRO, '半蔵門線':METRO, '南北線':METRO, '副都心線':METRO,
    '都営浅草線':TOEI, '都営三田線':TOEI, '都営新宿線':TOEI, '都営大江戸線':TOEI,
    '東急':'https://www.tokyu.co.jp/railway/traffic_info/',
    '小田急':'https://www.odakyu.jp/train/unkou/',
    '京急':'https://www.keikyu.co.jp/train/operation/',
    '西武':'https://www.seiburailway.jp/railways/operation/',
    '東武':'https://www.tobu.co.jp/train/operation/',
    '京王':'https://www.keio.co.jp/train/operation/',
    '相鉄':'https://www.sotetsu.co.jp/train/operation/',
    '京成':'https://www.keisei.co.jp/keisei/tetudou/unkou/index.php',
    '阪急':'https://rail.hankyu.co.jp/railinfo/delay',
    'JR西日本':'https://trafficinfo.westjr.co.jp/',
    'JR東海':'https://traininfo.jr-central.co.jp/',
    'JR九州':'https://www.jrkyushu.co.jp/train/info/',
    'JR北海道':'https://www.jrhokkaido.co.jp/network/trafficinfo/',
    '名古屋市営地下鉄':'https://www.kotsu.city.nagoya.jp/jp/pc/information/',

    '札幌市営地下鉄':'https://www.city.sapporo.jp/st/',
  };

  // 部分一致
  for (const [key, url] of Object.entries(map)) {
    if (name.includes(key) || key.includes(name)) {
      urls.push({ label: '公式運行情報', url });
      break;
    }
  }

  // Yahoo!路線
  urls.push({ label: 'Yahoo!路線', url: 'https://transit.yahoo.co.jp/traininfo/area/4/' });
  // Google検索
  urls.push({ label: 'Google検索', url: `https://www.google.com/search?q=${q}` });

  return urls;
}

/* ── Persist ── */
function saveLines() { localStorage.setItem('td_lines', JSON.stringify(lines)); }
function saveDeadlines() { localStorage.setItem('td_deadlines', JSON.stringify(deadlines)); }
function saveTimetable() { localStorage.setItem('td_timetable', JSON.stringify(timetable)); }

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  const d = new Date();
  document.getElementById('topDate').textContent = d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  document.getElementById('dlDate').min = new Date().toISOString().split('T')[0];
  renderTransit();
  renderDeadlines();
  renderTimetable();
  updateSummary();
  
  // 出席アラートタイマー監視の開始
  startAttendanceMonitor();
});

/* ── Tabs ── */
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

/* ── Transit ── */
function renderTransit() {
  const el = document.getElementById('transitList');
  if (!lines.length) {
    el.innerHTML = `<div class="empty"><i class="ti ti-train-off"></i>路線・ルートがまだ登録されていません<small>上のフォームから追加してください</small></div>`;
    return;
  }
  el.innerHTML = lines.map((line, i) => {
    const links = searchURL(line.name, line.type, line.dest);
    const linksHTML = links.map(l => {
      const isPrimaryClass = l.isPrimary ? 'style="font-weight:600;background:var(--blue-bg);border:1px solid var(--blue-text);color:var(--blue-text);"' : '';
      const icon = l.isPrimary ? 'ti-map-2' : 'ti-external-link';
      return `<a class="ext-link" href="${l.url}" target="_blank" rel="noopener" ${isPrimaryClass}><i class="ti ${icon}" style="font-size:12px"></i>${esc(l.label)}</a>`;
    }).join('');

    const st = line.status || 'unknown';
    const noteVal = esc(line.note || '');
    const statusDisplay = st === 'normal'
      ? `<span class="info-pill pill-normal"><span class="status-dot dot-normal"></span>平常運転</span>`
      : st === 'delay'
      ? `<span class="info-pill pill-delay"><span class="status-dot dot-delay"></span>遅延あり${line.note ? ' — ' + noteVal : ''}</span>`
      : st === 'stop'
      ? `<span class="info-pill pill-stop"><span class="status-dot dot-stop"></span>運転見合わせ${line.note ? ' — ' + noteVal : ''}</span>`
      : `<span style="font-size:12px;color:var(--text-tertiary)">未確認 — 下のリンクで確認後、ステータスをセットしてください</span>`;

    // 表示用のタイトル（目的地があれば矢印で繋ぐ）
    const titleText = line.dest ? `${esc(line.name)} ➔ ${esc(line.dest)}` : esc(line.name);

    return `<div class="transit-card">
      <div class="tc-header">
        <span class="tc-name">
          <i class="ti ${typeIcon[line.type]}" style="font-size:18px" aria-hidden="true"></i>
          ${titleText}
          <span class="type-badge ${typeClass[line.type]}">${typeLabel[line.type]}</span>
        </span>
        <div class="tc-actions">
          <button class="btn-del" onclick="deleteLine(${i})" aria-label="削除"><i class="ti ti-x"></i></button>
        </div>
      </div>

      <div style="margin-top:10px">${statusDisplay}</div>

      <div class="status-picker">
        <span>ステータスを更新：</span>
        <button class="status-btn ${st==='normal'?'active-normal':''}" onclick="setStatus(${i},'normal')">
          <span class="status-dot dot-normal"></span>平常運転
        </button>
        <button class="status-btn ${st==='delay'?'active-delay':''}" onclick="setStatus(${i},'delay')">
          <span class="status-dot dot-delay"></span>遅延
        </button>
        <button class="status-btn ${st==='stop'?'active-stop':''}" onclick="setStatus(${i},'stop')">
          <span class="status-dot dot-stop"></span>見合わせ
        </button>
      </div>

      ${st==='delay'||st==='stop' ? `<div class="status-note">
        <input type="text" placeholder="詳細メモ（例：人身事故のため約20分遅延）" value="${noteVal}"
          oninput="setNote(${i}, this.value)" />
      </div>` : ''}

      <div class="external-links" style="margin-top:10px">${linksHTML}</div>
      ${line.updatedAt ? `<div style="font-size:11px;color:var(--text-tertiary);margin-top:8px">最終更新: ${esc(line.updatedAt)}</div>` : ''}
    </div>`;
  }).join('');
}

// 1. 路線名（運行状況確認）のみ登録

  const name = document.getElementById('lineInput').value.trim();
  if (!name) return;
  lines.push({ 
    name, 
    dest: '', 
    type: document.getElementById('typeSelect1').value, 
    status: 'unknown', 
    note: '', 
    updatedAt: '' 
  });

// 2. 出発地 ➔ 目的地（Googleマップ乗換案内）登録
function addRoute() {
  const start = document.getElementById('startInput').value.trim();
  const dest = document.getElementById('destInput').value.trim();
  if (!start || !dest) {
    alert('出発地と目的地の両方を入力してください。');
    return;
  }
  lines.push({ 
    name: start, 
    dest: dest,

    status: 'unknown',

function deleteLine(i) { lines.splice(i,1); saveLines(); renderTransit(); updateSummary(); }

function setStatus(i, st) {
  lines[i].status = st;
  lines[i].updatedAt = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  if (st === 'normal') lines[i].note = '';
  saveLines(); renderTransit(); updateSummary();
}

function setNote(i, val) {
  lines[i].note = val;
  saveLines();
}

/* ── Deadlines ── */
function getDays(dateStr) {
  const t = new Date(); t.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d-t)/86400000);
}
function urgCls(days) {
  if (days < 0) return { bar:'bar-past', val:'days-past' };
  if (days <= 3) return { bar:'bar-urgent', val:'days-urgent' };
  if (days <= 7) return { bar:'bar-soon', val:'days-soon' };
  return { bar:'bar-ok', val:'days-ok' };
}
function filtered() {
  return deadlines.filter(d => {
    const days = getDays(d.date);
    if (dlFilter==='urgent') return days>=0&&days<=3;
    if (dlFilter==='week')   return days>=0&&days<=7;
    if (dlFilter==='month')  return days>=0&&days<=31;
    return true;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));
}

function renderDeadlines() {
  const el = document.getElementById('deadlineList');
  if (!deadlines.length) {
    el.innerHTML = `<div class="empty"><i class="ti ti-clipboard-off"></i>提出物がまだ登録されていません</div>`; return;
  }
  const items = filtered();
  if (!items.length) {
    el.innerHTML = `<div class="empty"><i class="ti ti-filter-off"></i>該当する提出物はありません</div>`; return;
  }
  el.innerHTML = items.map(dl => {
    const days = getDays(dl.date);
    const c = urgCls(days);
    const txt = days<0?'期限切れ':days===0?'今日！':`あと${days}日`;
    const dateStr = new Date(dl.date).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',weekday:'short'});
    const notif = days>=0&&days<=3?'<span class="notif">要注意</span>':'';
    const idx = deadlines.indexOf(dl);
    return `<div class="dl-card">
      <div class="urgency-bar ${c.bar}"></div>
      <div class="dl-content">
        <div class="dl-title">${esc(dl.title)} ${notif}</div>
        <div class="dl-meta"><i class="ti ti-book" style="font-size:12px;margin-right:4px" aria-hidden="true"></i>${esc(dl.subject)} &nbsp;·&nbsp; ${dlTypeLabel[dl.type]}</div>
      </div>
      <div class="dl-right">
        <div class="days-val ${c.val}">${txt}</div>
        <div class="date-lbl">${dateStr}</div>
      </div>
      <button class="btn-del" onclick="deleteDL(${idx})" aria-label="削除"><i class="ti ti-x"></i></button>
    </div>`;
  }).join('');
}

function addDeadline() {
  const title = document.getElementById('dlTitle').value.trim();
  const date  = document.getElementById('dlDate').value;
  if (!title||!date) { alert('名前と締め切り日を入力してください'); return; }
  deadlines.push({
    title,
    subject: document.getElementById('dlSubject').value.trim() || '科目未設定',
    date,
    type: document.getElementById('dlType').value
  });
  document.getElementById('dlTitle').value = '';
  document.getElementById('dlSubject').value = '';
  document.getElementById('dlDate').value = '';
  saveDeadlines(); renderDeadlines(); updateSummary();
}

function deleteDL(i) { deadlines.splice(i,1); saveDeadlines(); renderDeadlines(); updateSummary(); }

function filterDL(f, btn) {
  dlFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderDeadlines();
}

/* ── Timetable ── */
function renderTimetable() {
  const el = document.getElementById('timetableList');
  if (!timetable.length) {
    el.innerHTML = `<div class="empty"><i class="ti ti-calendar-time"></i>時間割がまだ登録されていません<small>上のフォームから追加してください</small></div>`;
    return;
  }

  const sortedDays = ['1', '2', '3', '4', '5', '6', '0'];
  let html = '';

  sortedDays.forEach(dayKey => {
    const items = timetable.filter(t => t.day === dayKey).sort((a,b) => a.time.localeCompare(b.time));
    if (items.length > 0) {
      html += `<div class="day-section">
        <div class="day-header"><i class="ti ti-calendar" aria-hidden="true"></i>${dayLabels[dayKey]}</div>
        <div class="tt-grid">`;
      
      items.forEach(item => {
        html += `<div class="tt-card">
          <span class="tt-time">${esc(item.time)}</span>
          <div class="tt-info">
            <span class="tt-title">${esc(item.title)}</span>
            <span class="tt-room"><i class="ti ti-map-pin" style="font-size:12px;" aria-hidden="true"></i>${esc(item.room)}</span>
          </div>
          <button class="btn-del" onclick="deleteTimetable('${item.id}')" aria-label="削除"><i class="ti ti-x"></i></button>
        </div>`;
      });
      
      html += `</div></div>`;
    }
  });

  el.innerHTML = html;
}

function addTimetable() {
  const day = document.getElementById('ttDay').value;
  const title = document.getElementById('ttTitle').value.trim();
  const room = document.getElementById('ttRoom').value.trim() || '教室未設定';
  const time = document.getElementById('ttTime').value;

  if (!title || !time) {
    alert('科目名と開始時間を入力してください');
    return;
  }

  timetable.push({
    id: Date.now().toString(),
    day,
    title,
    room,
    time
  });

  document.getElementById('ttTitle').value = '';
  document.getElementById('ttRoom').value = '';
  document.getElementById('ttTime').value = '';

  saveTimetable();
  renderTimetable();
}

function deleteTimetable(id) {
  timetable = timetable.filter(t => t.id !== id);
  saveTimetable();
  renderTimetable();
}

/* ── Attendance Monitor ("出席登録忘れないくん") ── */
function startAttendanceMonitor() {
  // 60秒(1分)ごとに時刻チェックを実行
  setInterval(checkAttendanceReminders, 60000);
  
  // 読み込み時にも一度即時チェック
  checkAttendanceReminders();
}

function checkAttendanceReminders() {
  const now = new Date();
  const currentDay = now.getDay().toString(); // "0"(日) 〜 "6"(土)
  const currentH = now.getHours();
  const currentM = now.getMinutes();
  const currentTimeStr = `${String(currentH).padStart(2, '0')}:${String(currentM).padStart(2, '0')}`;
  
  // 今日の日付文字列 (重複アラート制御用)
  const todayStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;

  timetable.forEach(item => {
    // 曜日が一致するかチェック
    if (item.day !== currentDay) return;

    // 授業の開始時間から15分後の時刻を算出
    const [h, m] = item.time.split(':').map(Number);
    let targetM = m + 15;
    let targetH = h;
    
    if (targetM >= 60) {
      targetM -= 60;
      targetH = (targetH + 1) % 24;
    }
    
    const targetTimeStr = `${String(targetH).padStart(2, '0')}:${String(targetM).padStart(2, '0')}`;

    // 時間がちょうど一致した場合
    if (currentTimeStr === targetTimeStr) {
      const alertKey = `${item.id}_${todayStr}`;
      
      // 本日この授業でまだ通知していない場合のみ発火
      if (!alertedToday[alertKey]) {
        alertedToday[alertKey] = true;
        alert(`【${item.title}】出席登録終わった？`);
      }
    }
  });
}

/* ── Summary ── */
function updateSummary() {
  document.getElementById('sumLines').textContent = lines.length;
  document.getElementById('sumDelays').textContent = lines.filter(l=>l.status==='delay'||l.status==='stop').length;
  document.getElementById('sumUrgent').textContent = deadlines.filter(d=>{const v=getDays(d.date);return v>=0&&v<=3;}).length;
  const now=new Date(), me=new Date(now.getFullYear(),now.getMonth()+1,0);
  document.getElementById('sumTotal').textContent = deadlines.filter(d=>{const dd=new Date(d.date);return dd>=now&&dd<=me;}).length;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
